[workspace]
name = "cpp-dev"
version = "0.1.0"
description = "C++ Development Environment"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[activation]
scripts = ["context/setup.sh"]

[activation.env]
LD_LIBRARY_PATH = "${PIXI_PROJECT_ROOT}/lib:$LD_LIBRARY_PATH"

# ==============================================================================
# default environment: ビルド・テストのみ必要なパッケージ
# ==============================================================================
[dependencies]
# C++17 minimum requirement: clang >= 5.0, gcc >= 7.0, MSVC >= 19.14 (VS2017)
clang = "==21.1.1"  # C/C++ compiler (clang/clang++)
cmake = "==4.1.1"   # Build system generator
ninja = "==1.13.1"  # Build system
ccache = ">=4.10.0,<5"  # C/C++ compiler cache

[target.linux-64.dependencies]
gcc = "==15.1.0"           # GCC compiler
gxx = "==15.1.0"           # G++ compiler
mold = "==2.40.4"          # Fast linker
libgcc-ng = "==15.1.0"     # GCC runtime library
libstdcxx-ng = "==15.1.0"  # C++ standard library

[target.win-64.dependencies]
clang_win-64 = "==21.1"    # Clang cross-compiler for Windows
clangxx_win-64 = "==21.1"  # Clang++ cross-compiler for Windows
# MSYS2/MinGW related packages
m2w64-sysroot_win-64 = "==12.0.0.r4.gg4f2fc60ca"  # System root for MinGW-w64
m2-gcc-libs = "==13.3.0.1"        # GCC runtime libraries
libgcc-devel_win-64 = "==15.1.0"  # GCC development libraries

# ==============================================================================
# dev feature: 開発者向け追加ツール（静的解析・カバレッジ・スペルチェック等）
# ==============================================================================
[feature.dev.dependencies]
lld = "==21.1.1"          # LLVM linker (coverage build で使用)
clang-tools = "==21.1.1"  # clang-tidy, clang-format, clangd
cppcheck = "==2.18.3"     # Static analysis tool
typos = ">=1.36.3,<2"     # Spell checker
llvm-tools = "==21.1.1"   # llvm-cov (coverage analysis)
clangxx = "==21.1.1"      # clang++ (coverage build / Linux)

[feature.dev.tasks]
format = "cmake --build build --target format"
lint = "cmake --build build --target lint"
run-cppcheck = "cmake --build build --target run-cppcheck"
fullcheck = "pixi run -e dev typos && pixi run -e dev lint && pixi run -e dev run-cppcheck"

[feature.dev.target.linux-64.dependencies]
compiler-rt_linux-64 = "==21.1.1"  # Clang runtime libraries (ASan, coverage, etc.)
# Note: valgrind is NOT listed here.
# conda-forge valgrind cannot inspect binaries that use the system dynamic linker
# (/lib64/ld-linux-x86-64.so.2). Install valgrind via the system package manager instead:
#   sudo apt-get install valgrind   # Ubuntu/Debian

[feature.dev.target.linux-64.tasks.asan]
cmd = """
cmake --preset=asan &&
cmake --build build-asan &&
ctest --test-dir build-asan
"""
env = { CC = "gcc", CXX = "g++" }

[feature.dev.target.linux-64.tasks.coverage]
cmd = """
cmake --preset=coverage &&
cmake --build build-coverage --target coverage &&
cmake --build build-coverage --target coverage-report
"""
env = { CC = "clang", CXX = "clang++" }

# ==============================================================================
# environments
# ==============================================================================
[environments]
default = { solve-group = "main" }
dev = { features = ["dev"], solve-group = "main" }

# ==============================================================================
# tasks (default environment)
# ==============================================================================
[tasks]
# ---- normal workflow ----
config = "cmake --preset=release"
config-debug = "cmake --preset=debug"

build = "cmake --build build"
test = "ctest --test-dir build"

clean = """
cmake --build build --target clean || true &&
cmake --build build-asan --target clean || true &&
cmake --build build-coverage --target clean || true
"""


# ---- sanitizer workflow ----
asan = """
cmake --preset=asan &&
cmake --build build-asan &&
ctest --test-dir build-asan
"""

# ---- coverage workflow ----
coverage = """
cmake --preset=coverage &&
cmake --build build-coverage --target coverage &&
cmake --build build-coverage --target coverage-report
"""

# ---- valgrind workflow ----
# Requires system valgrind: sudo apt-get install valgrind  (Ubuntu/Debian)
valgrind = """
valgrind --error-exitcode=1 --leak-check=full --show-leak-kinds=all --track-origins=yes --error-exitcode=1 ./build/tests/test_config_manager &&
valgrind --error-exitcode=1 --leak-check=full --show-leak-kinds=all --track-origins=yes --error-exitcode=1 ./build/tests/test_doctest_usage &&
valgrind --error-exitcode=1 --leak-check=full --show-leak-kinds=all --track-origins=yes --error-exitcode=1 ./build/tests/test_yyjson_wrapper
"""
